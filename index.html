<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;700&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family:'Poppins',sans-serif;
    text-align:center;
    background: linear-gradient(-45deg,#ff9a9e,#fad0c4,#fad0c4,#ff9a9e);
    background-size: 400% 400%;
    animation: gradientBG 15s ease infinite;
    color:#fff;
    padding:20px;
}

@keyframes gradientBG {
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.overlay {
    background: rgba(0,0,0,0.55);
    padding:25px;
    border-radius:20px;
    max-width:700px;
    margin:auto;
}

/* IMAGE */
.top-image{
    width:100%;
    height:260px;
    object-fit:cover;
    border-radius:15px;
    margin-bottom:15px;
}

/* NAMES */
.names {
    font-weight:800;
    background: linear-gradient(90deg,#ff416c,#ff4b2b,#f9d423,#42e695);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    font-size: clamp(22px,6vw,36px);
}

/* 🔥 PREMIUM COUNTDOWN */
#fancy-countdown{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-top:15px;
    flex-wrap:wrap;
}

.count-box{
    background: rgba(0,0,0,0.7);
    padding:12px 14px;
    border-radius:15px;
    min-width:70px;
    box-shadow:0 4px 15px rgba(0,0,0,0.5);
    transition:0.3s;
}

.count-box:hover{
    transform:scale(1.08);
    background: rgba(255,255,255,0.15);
}

.count-box strong{
    font-size:20px;
    display:block;
}

.count-box span{
    font-size:12px;
    opacity:0.8;
}

/* EVENTS */
.event-card {
    background: rgba(0,0,0,0.75);
    margin:12px auto;
    padding:18px;
    border-radius:18px;
    max-width:400px;
}

</style>
</head>

<body>

<div class="overlay">

<img src="02.jpg.jpeg" class="top-image">

<h2>💍 Wedding Invitation 💍</h2>
<div class="names">Pradumn ♥️ Rutuja</div>

<p>📅 01 May 2026<br>⏰ 12:30 PM</p>

<div id="fancy-countdown"></div>

</div>

<h2>✨ Events ✨</h2>

<div class="event-card">
<h3>🌿 Mehendi</h3>
<p>29 April • 05:00 PM</p>
<p>Traditional colorful ceremony 🎨</p>
</div>

<div class="event-card">
<h3>🎶 Haldi</h3>
<p>30 April • 07:00 PM</p>
<p>Haldi ceremony with fun, music & joy 💛</p>
</div>

<div class="event-card">
<h3>💍 Wedding</h3>
<p>01 May • 12:30 PM</p>
<p>The beginning of forever ❤️</p>
</div>

<script>
const weddingDate = new Date("May 1, 2026 12:30:00").getTime();

function updateCountdown(){
const now = new Date().getTime();
const diff = weddingDate - now;

if(diff <= 0){
document.getElementById("fancy-countdown").innerHTML="🎉 Wedding Started!";
return;
}

const d = Math.floor(diff/(1000*60*60*24));
const h = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
const m = Math.floor((diff%(1000*60*60))/(1000*60));
const s = Math.floor((diff%(1000*60))/1000);

document.getElementById("fancy-countdown").innerHTML =
`
<div class="count-box"><strong>${d}</strong><span>Days</span></div>
<div class="count-box"><strong>${h}</strong><span>Hours</span></div>
<div class="count-box"><strong>${m}</strong><span>Minutes</span></div>
<div class="count-box"><strong>${s}</strong><span>Seconds</span></div>
`;
}

updateCountdown();
setInterval(updateCountdown,1000);
</script>

</body>
</html>
