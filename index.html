<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;700&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family:'Poppins',sans-serif;
    overflow-x:hidden;
    text-align:center;
    color:#fff;

    /* FULL IMAGE BACKGROUND */
    background: url("02.jpg.jpeg") no-repeat center center/cover;
}

/* DARK OVERLAY */
body::before {
    content:"";
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.65);
    z-index:-1;
}

/* GLASS CARD */
.overlay {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    padding:25px;
    border-radius:25px;
    max-width:750px;
    margin:40px auto;
    box-shadow:0 10px 40px rgba(0,0,0,0.6);
}

/* TOP IMAGE */
.top-image {
    width:100%;
    height:260px;
    object-fit:cover;
    border-radius:20px;
    margin-bottom:15px;
}

/* NAMES */
.names {
    font-size:32px;
    font-weight:800;
    margin:15px 0;
    background: linear-gradient(90deg,#ffcc00,#7CFC00);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* COUNTDOWN */
#fancy-countdown{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-top:15px;
}

.count-box{
    background: rgba(0,0,0,0.8);
    padding:10px 15px;
    border-radius:12px;
    min-width:65px;
    font-weight:700;
}

.count-box span{
    display:block;
    font-size:12px;
    color:#ccc;
}

/* EVENTS */
.event-card {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    margin:15px auto;
    padding:20px;
    border-radius:20px;
    max-width:400px;
}

/* BUTTON */
.map-btn {
    display:inline-block;
    margin-top:10px;
    padding:8px 20px;
    border-radius:25px;
    border:1px solid #7CFC00;
    color:#7CFC00;
    text-decoration:none;
}
.map-btn:hover{
    background:#7CFC00;
    color:black;
}
</style>
</head>

<body>

<div class="overlay">

<img src="02.jpg.jpeg" class="top-image">

<h2>💍 Wedding Invitation 💍</h2>

<div class="names">Pradumn 💛 Rutuja</div>

<p>📅 01 May 2026<br>⏰ 12:30 PM</p>

<div id="fancy-countdown"></div>

</div>

<h2>✨ Events ✨</h2>

<div class="event-card">
<h3>🌿 Mehendi</h3>
<p>29 April • 05:00 PM</p>
</div>

<div class="event-card">
<h3>🎶 Haldi</h3>
<p>30 April • 07:00 PM</p>
</div>

<div class="event-card">
<h3>💍 Wedding</h3>
<p>01 May • 12:30 PM</p>
</div>

<div class="event-card">
<h3>📍 Venue</h3>
<p>Aaisaheb Lawns, Badnapur</p>
<a class="map-btn" href="https://www.google.com/maps?q=Aaisaheb+Lawns+Badnapur" target="_blank">View Map</a>
</div>

<script>
const weddingDate = new Date("May 1, 2026 12:30:00").getTime();

function updateCountdown(){
const now = new Date().getTime();
const distance = weddingDate - now;

if(distance<0){
document.getElementById("fancy-countdown").innerHTML="🎉 Started!";
return;
}

const d=Math.floor(distance/(1000*60*60*24));
const h=Math.floor((distance%(1000*60*60*24))/(1000*60*60));
const m=Math.floor((distance%(1000*60*60))/(1000*60));
const s=Math.floor((distance%(1000*60))/1000);

document.getElementById("fancy-countdown").innerHTML=
`<div class="count-box">${d}<span>Days</span></div>
<div class="count-box">${h}<span>Hours</span></div>
<div class="count-box">${m}<span>Minutes</span></div>
<div class="count-box">${s}<span>Seconds</span></div>`;
}

setInterval(updateCountdown,1000);
</script>

</body>
</html>
